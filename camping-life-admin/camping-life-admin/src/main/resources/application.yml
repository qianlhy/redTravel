# JPA/Hibernate 配置
spring.jpa:
  hibernate:
    ddl-auto: update
  show-sql: true
  properties:
    hibernate:
      dialect: org.hibernate.dialect.MySQLDialect
      format_sql: true

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8

# MyBatis-Plus 配置
mybatis-plus:
  type-aliases-package: com.camping.life.**.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-prefix: ""
  mapper-locations: classpath*:mapper/**/*.xml
  type-enums-package: com.camping.life.**.enums

# 日志级别
logging:
  level:
    com.camping.life: debug
    com.baomidou.mybatisplus: debug
